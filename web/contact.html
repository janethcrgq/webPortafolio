  <body>

    <header>
        <nav>
          <div class="links"> 
            <a  href="index.html"> HOME </a> |
            <a href="about.html"> BIO </a> |

          </div>

    <main class="contact">

      <div class="hablemosJuntos">
        <h1> Hablemos <br class="saltoTitulo"> <span class="juntosTextAzul"> juntos_ </span></h1>
        <p> Estoy disponible para proyectos, <br> colaboraciones o cualquier pregunta. <br> Escribeme 
            y con gusto te respondo</p>
      </div>


      <div class="formulario">
        <div class="topFormContacto">
            <span class="puntoRojo"> </span>
            <span class="puntoAmarillo"></span>
            <span class="puntoVerde"> </span>
            <p> CONTACTO.EXE</p>         
        </div>

        <form action="https://formspree.io/f/xjgapvzw" method="post"> 


          <div class="formRow"> 
            <div class="form">
            <label for="nombre"> NOMBRE </label>
            <input type="text" id="nombre" name="nombre" placeholder="Ej. Janeth Galvan">
            </div>
          
            <div class="form"> 
            <label for="email"> CORREO </label>
            <input type="email" id="email" name="email" placeholder="ejemplo@gmail.com" required pattern="^[^@\s]+@[^@\s]+\[^@\s]+$">
            </div>
          </div>
         

          <div class="formRow"> 
            <div class="form"> 
            <label for="telefono"> TELÉFONO </label>
            <input type="tel" id="telefono" name="telefono" placeholder="10 digitos" pattern="[0-9]{10}">
            </div>
         
      
            <div class="form"> 
            <label for="motivo"> MOTIVO </label>
            <select name="motivo" id="motivo">
              <option value= ""> seleccione una opcion </option>
              <option value="trabajo"> trabajo </option> 
              <option value="clases"> clases </option> 
              <option value="asesorias"> asesorias </option> 
            </select>
            </div>
          </div>
          

          <div class="form"> 
          <label> CÓMO CONTACTARTE? </label>
            <div class="radioGroup">
            <input type="Radio" class="radio" id="contacto-correo" name="contacto" value="correo">
            <label for="contacto-correo"> CORREO </label>
            
            <input type="Radio" class="radio"  id="contacto-wha" name="contacto" value="whatsapp">
            <label for="contacto-wha"> WHATSAPP </label>              
            </div>
    
          </div>

          <div class="form"> 
          <label for="mensaje"> MENSAJE </label>
          <textarea id="mensaje" name="mensaje" placeholder="Cuéntame en qué puedo ayudarte"></textarea>
          </div>
          
          <div class="buttonGroup"> 
          <button class="botonEnviar" type="submit"> ENVIAR </button>
          <button class="botonLimpiar" type="reset"> LIMPIAR </button>
          </div>
        </form>
      </div>
    </main>
    




  </body>
</html>
